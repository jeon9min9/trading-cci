<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설정 — trading CCI</title>
<link rel="stylesheet" href="css/style.css">
<script>
  (function () {
    var saved = localStorage.getItem("sl_theme");
    if (saved) document.documentElement.setAttribute("data-theme", saved);
  })();
</script>
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="index.html">← trading CCI</a>
    <div class="header-actions">
      <button class="theme-toggle" aria-label="테마 전환"></button>
    </div>
  </header>
  <main class="container">
    <div id="notice"></div>

    <div class="section">
      <h2>Twelve Data API</h2>
      <label class="field"><span>API 키</span>
        <input id="api-key" type="password" autocomplete="off" placeholder="발급받은 키 입력">
      </label>
      <div class="actions">
        <button class="btn small" id="toggle-key">표시</button>
      </div>
      <p class="hint">키는 이 기기의 브라우저(localStorage)에만 저장됩니다. 무료 키 발급: <a href="https://twelvedata.com/pricing" target="_blank" rel="noopener">twelvedata.com</a></p>
    </div>

    <div class="section">
      <h2>데이터</h2>
      <div class="field-row">
        <label class="field"><span>CCI 봉 주기</span>
          <select id="candle-interval">
            <option value="1day">일봉</option>
            <option value="1h">1시간봉</option>
            <option value="15min">15분봉</option>
          </select>
        </label>
        <label class="field"><span>왕복 수수료율 %</span>
          <input id="fee-pct" inputmode="decimal">
        </label>
      </div>
      <label class="field"><span>관심 종목 (쉼표 구분)</span>
        <input id="symbols" placeholder="SOXL, BITX, TQQQ, SPXL, QLD">
      </label>
    </div>

    <div class="section">
      <h2>사다리 기본값 (새 종목 설정 시 적용)</h2>
      <div class="field-row wide">
        <label class="field"><span>레벨 간격 %</span><input id="d-stepPct" inputmode="decimal"></label>
        <label class="field"><span>레벨 수</span><input id="d-levels" inputmode="numeric"></label>
        <label class="field"><span>목표 수익률 %</span><input id="d-targetPct" inputmode="decimal"></label>
      </div>
      <div class="field-row">
        <label class="field"><span>레벨당 금액 $</span><input id="d-amountPerLevel" inputmode="decimal"></label>
        <label class="field"><span>하위 레벨 배수</span><input id="d-multiplier" inputmode="decimal"></label>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary" id="save">저장</button>
    </div>

    <div class="section">
      <h2>포지션 데이터 공유 (Claude 연동)</h2>
      <div class="actions">
        <button class="btn" id="export-btn">JSON 클립보드 복사</button>
      </div>
      <p class="hint">복사한 JSON을 Claude Code에 붙여넣으면 포지션 분석·브리핑에 사용됩니다.</p>
      <label class="field" style="margin-top:0.8rem"><span>가져오기 (JSON 붙여넣기)</span>
        <textarea class="import-box" id="import-box" placeholder='{"positions": {...}}'></textarea>
      </label>
      <div class="actions">
        <button class="btn" id="import-btn">가져오기 (기존 포지션 덮어씀)</button>
      </div>
    </div>

    <p class="disclaimer">이 도구는 사용자가 정의한 매매 룰의 기계적 계산·판정과 공개 시세 정보 표시만 제공합니다. 투자 권유·자문이 아니며, 모든 매매 판단과 주문 실행의 책임은 사용자에게 있습니다.</p>
  </main>
  <script src="js/theme.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui-settings.js"></script>
</body>
</html>
