<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 계산기</title>
<meta name="theme-color" content="#0d0e11">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="주식 계산기">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="css/style.css">
<script>
  (function () {
    var saved = localStorage.getItem("cci_theme");
    if (saved) document.documentElement.setAttribute("data-theme", saved);
  })();
</script>
</head>
<body>
  <header class="site-header">
    <span class="site-title">주식 계산기</span>
    <button class="theme-toggle" aria-label="테마 전환"></button>
  </header>

  <main class="container">
    <div class="inputs single">
      <label class="field">
        <span>매수가 $</span>
        <input id="buyPrice" inputmode="decimal" placeholder="예: 152.97">
      </label>
    </div>
    <div class="amount-line">1회 매수 금액 (매수가 × 1%) <strong id="buyAmountView">-</strong></div>

    <div class="table-wrap">
      <table id="ladder">
        <thead>
          <tr>
            <th>하락</th>
            <th>매수가</th>
            <th>금액</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <p class="hint">1회 매수 금액은 매수가의 1%로 자동 계산됩니다. 매수가에서 1%씩 떨어질 때마다 그 금액만큼 분할매수하는 표입니다. CCI가 -50~-100 구간에 들어왔을 때 사용하세요.</p>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/calc.js"></script>
</body>
</html>
