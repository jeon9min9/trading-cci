<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>종목 상세 — trading CCI</title>
<link rel="stylesheet" href="css/style.css">
<script>
  (function () {
    var saved = localStorage.getItem("sl_theme");
    if (saved) document.documentElement.setAttribute("data-theme", saved);
  })();
</script>
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="index.html">← trading CCI</a>
    <div class="header-actions">
      <a class="header-link" href="settings.html">설정</a>
      <button class="theme-toggle" aria-label="테마 전환"></button>
    </div>
  </header>
  <main class="container">
    <div class="refresh-bar">
      <span id="refresh-info">-</span>
      <button class="btn small" id="refresh-btn">새로고침</button>
    </div>
    <div id="notice"></div>

    <div class="ticker-head">
      <div>
        <div id="symbol-name" style="font-weight:750"></div>
        <div class="price-big num" id="price-big">-</div>
      </div>
      <div class="sub num" id="head-sub"></div>
    </div>

    <details class="section" id="params-section">
      <summary>사다리 설정</summary>
      <div id="params-form"></div>
      <div class="actions">
        <button class="btn primary" id="save-params">저장 후 재계산</button>
        <button class="btn" id="use-current-price">현재가를 시작가로</button>
        <button class="btn" id="close-position">포지션 종료</button>
      </div>
      <p class="hint">체결 기록이 있는 상태에서 설정을 바꾸면 기존 체결 기록은 유지되고 미체결 레벨만 재계산됩니다.</p>
    </details>

    <div class="ladder-wrap" id="ladder-wrap"></div>

    <div class="actions">
      <button class="btn" id="tv-toggle">TradingView 차트 보기</button>
    </div>
    <div id="tv-widget"></div>

    <p class="disclaimer">이 도구는 사용자가 정의한 매매 룰의 기계적 계산·판정과 공개 시세 정보 표시만 제공합니다. 투자 권유·자문이 아니며, 모든 매매 판단과 주문 실행의 책임은 사용자에게 있습니다.</p>
  </main>

  <div class="summary-bar" id="summary-bar" hidden>
    <div class="cell"><span class="k">평단</span><span class="v num" id="sb-avg">-</span></div>
    <div class="cell"><span class="k">투입액</span><span class="v num" id="sb-cost">-</span></div>
    <div class="cell"><span class="k">평가손익</span><span class="v num" id="sb-pnl">-</span></div>
    <div class="cell"><span class="k">목표까지</span><span class="v num" id="sb-target">-</span></div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/store.js"></script>
  <script src="js/cci.js"></script>
  <script src="js/ladder.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui-ticker.js"></script>
</body>
</html>
